run:
  output_dir: "artifacts/tokenizer/runs"
  seed: 0
  log_level: "INFO"
  report_output_path: "docs/data_collection_report.md"
  stage3_metrics_every_merges: 200

data:
  input_paths:
    - "data/raw/owt_train.txt.gz"
  input_format: "text"
  jsonl_text_field: "text"
  decode_errors: "replace"
  normalize: "none"
  max_bytes: 10737418240
  max_lines: null
  num_workers: 4
  batch_lines: 2000
  min_piece_freq: 2
  max_unique_pieces: 2000000

pretokenizer:
  pattern: "gpt2_fast"
  custom_pattern: null
  flags: []

bpe:
  vocab_size: 32000
  min_merge_freq: 2
  max_merges: null
  max_word_types: 1500000
  max_piece_bytes: 200
  tie_break: "lexicographic"

special_tokens:
  tokens:
    - "<|endoftext|>"
    - "<|pad|>"
  placement: "end"

checkpointing:
  enabled: true
  snapshot_every_merges: 1000
  wal_enabled: true
  wal_fsync_every_commits: 200
  wal_fsync_mode: "periodic"
  resume_mode: "off"
